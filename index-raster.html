<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfólio de colaboração de marca da Helena Steiger.">
  <title>Helena Steiger | Brand Collaboration Portfolio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="portfolio" aria-label="Portfólio Helena Steiger">
    <section class="screen" id="inicio" aria-label="Capa">
      <img src="assets/screens/screen-01.png" alt="Helena Steiger - Brand Collaboration Portfolio">
      <a class="hotspot hotspot--portfolio" href="#conteudo" aria-label="Ver portfólio"></a>
      <a class="hotspot hotspot--work" href="#contato" aria-label="Trabalhe comigo"></a>
    </section>

    <section class="screen" id="sobre" aria-label="Sobre mim">
      <img src="assets/screens/screen-02.png" alt="Sobre mim - A criadora por trás da influência">
    </section>

    <section class="screen" id="numeros" aria-label="Estatísticas">
      <img src="assets/screens/screen-03.png" alt="Estatísticas de audiência e engajamento">
    </section>

    <section class="screen" id="parcerias" aria-label="Parcerias">
      <img src="assets/screens/screen-04.png" alt="Marcas de sucesso que já trabalharam com Helena">
    </section>

    <section class="screen" id="conteudo" aria-label="Universo de conteúdo">
      <img src="assets/screens/screen-05.png" alt="Universo de conteúdo de beleza, moda, desenvolvimento pessoal, vlogs e lifestyle">
    </section>

    <section class="screen" id="videos" aria-label="Portfólio de vídeos">
      <img src="assets/screens/screen-06.png" alt="Conteúdo que gera conexão e chamada para portfólio de vídeos">
      <a class="hotspot hotspot--videos" href="#servicos" aria-label="Acessar portfólio de vídeos"></a>
    </section>

    <section class="screen" id="servicos" aria-label="Serviços">
      <img src="assets/screens/screen-07.png" alt="O que posso criar para sua marca">
    </section>

    <section class="screen" id="diferenciais" aria-label="Diferenciais">
      <img src="assets/screens/screen-08.png" alt="Por que as marcas trabalham comigo">
    </section>

    <section class="screen" id="galeria" aria-label="Estética visual">
      <img src="assets/screens/screen-09.png" alt="Galeria de estética visual">
    </section>

    <section class="screen" id="contato" aria-label="Contato">
      <img src="assets/screens/screen-10.png" alt="Vamos criar algo memorável juntas">
      <a class="hotspot contact-link contact-link--instagram" href="#" aria-label="Instagram"></a>
      <a class="hotspot contact-link contact-link--tiktok" href="#" aria-label="TikTok"></a>
      <a class="hotspot contact-link contact-link--email" href="mailto:contato@helenasteiger.com" aria-label="E-mail"></a>
      <a class="hotspot contact-link contact-link--whatsapp" href="#" aria-label="WhatsApp"></a>
    </section>
  </main>
</body>
</html>
